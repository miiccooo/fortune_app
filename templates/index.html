<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fortune Palette</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Lobster+Two:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="wrap">
    <h1>Fortune Palette</h1>
    <div class="magic-line"></div>
    <p class="sub">生年月日を入力してね★<br>
      太陽星座×タロット×四柱推命（簡易）で今日のヒントをあなたに♪</p>

    <form class="card form-card fx fx-pop fx-float" method="post" action="/result">
      <label>生年月日（YYYY-MM-DD）</label>


      <div class="date-select">

        <select name="year" required>
          <option value="">年</option>
          {% for y in range(1950, 2026) %}
          <option value="{{ y }}" {% if year==y|string %}selected{% endif %}>{{ y }}</option>
          {% endfor %}
        </select>

        <select name="month" required>
          <option value="">月</option>
          {% for m in range(1, 13) %}
          <option value="{{ m }}" {% if month==m|string %}selected{% endif %}>{{ m }}</option>
          {% endfor %}
        </select>

        <select name="day" required>
          <option value="">日</option>
          {% for d in range(1, 32) %}
          <option value="{{ d }}" {% if day==d|string %}selected{% endif %}>{{ d }}</option>
          {% endfor %}
        </select>

      </div>
      {% if error %}
      <p class="error">入力エラー：{{ error }}</p>
      {% endif %}
      <button type="submit">占う</button>
    </form>

    <p class="foot">※学習用の簡易ロジック（年柱は西暦年基準）</p>
  </div>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
